# 定时获取汇率并推送到钉钉
# 配置方式二选一（推荐 Secrets，更安全）：
#   方式一：Settings → Secrets and variables → Actions → Secrets 添加 DINGTALK_WEBHOOK_URL、DINGTALK_SECRET
#   方式二：同路径 → Variables 添加（Webhook URL 含 token，建议用 Secrets）

name: CNY/IDR 汇率推送

on:
  push:
    branches: [main, master]
  schedule:
    # 每天北京时间 9:00（1:00 UTC），可按需修改 cron
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: rate_log.json
          key: rate-log-${{ runner.os }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行推送
        env:
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          if [ -z "$DINGTALK_WEBHOOK_URL" ]; then
            echo "::error::未配置 DINGTALK_WEBHOOK_URL。请到仓库 Settings → Secrets and variables → Actions → Secrets 中添加（必须是 Secrets，不是 Variables）"
            exit 1
          fi
          python main.py
