# 定时获取汇率并推送到钉钉
# 配置方式二选一（推荐 Secrets，更安全）：
#   方式一：Settings → Secrets and variables → Actions → Secrets 添加 DINGTALK_WEBHOOK_URL、DINGTALK_SECRET
#   方式二：同路径 → Variables 添加（Webhook URL 含 token，建议用 Secrets）

name: CNY/IDR 汇率推送

on:
  push:
    branches: [main, master]
  schedule:
    # 每天北京时间 9:00（1:00 UTC），可按需修改 cron
    - cron: '0 1 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: github-pages  # 使用与 Pages 相同环境，可读取该 Environment 的 variables/secrets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: rate_log.json
          key: rate-log-${{ runner.os }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 检查钉钉配置
        id: check
        run: |
          URL="${{ secrets.DINGTALK_WEBHOOK_URL || vars.DINGTALK_WEBHOOK_URL }}"
          if [ -z "$URL" ]; then
            echo "::error::未配置 DINGTALK_WEBHOOK_URL。请到仓库 Settings → Secrets and variables → Actions，在 Secrets 或 Variables 中添加"
            exit 1
          fi
          echo "钉钉 Webhook 已配置，开始推送"

      - name: 运行推送
        env:
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL || vars.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET || vars.DINGTALK_SECRET }}
        run: python main.py
